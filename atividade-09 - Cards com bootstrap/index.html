<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards com bootstrap</title>
</head>
<body>
    <div class="card" style="width: 18rem;">
        <img src="download.jpg" class="card-img-top" alt="Jack Sparrow">
        <div class="card-body">
            <h5 class="card title">Capitão Jack Sparrow</h5>
            <p class="card-text">"Esse dia será lembrado como o dia que vocês quase capturaram Jack Sparrow"</p>
            <a href="#" class="btn btn-primary">Visualizar</a>
        </div>
    </div>

    <!-- Bootstrap JavaScript -->
     

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertas e Botões</title>
</head>
<body class="bg-light">

    <div class="alert alert-success">Cadastro realzado com sucesso!</div>
    <div class="alert alert-danger">Erro ao processar!</div>
    <div class="alert alert-warning">Atenação: campo obrigatório</div>
    <div class="alert alert-info">Dica: use letras maiúsculas</div>

    <button class="btn btn-primary">Primário</button>
    <button class="btn btn-secondary">Secundário</button>
    <button class="btn btn-success">Sucesso</button>
    <button class="btn btn-danger">Perigo</button>
    <button class="btn btn-warning">Atenção</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-outline-primary">Borda Azul</button>
    
</body>
</html>

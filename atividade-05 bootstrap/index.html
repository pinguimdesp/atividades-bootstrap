<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margens e Cor de texto com Bootstrap</title>
</head>
<body>
    <!-- Margens: m-1 até m-5 -->
    <div class="m-3">Margens tamanho 3</div>
    <div class="mt-3">Margem só em cima</div>
    <div class="mb-3">Margem só embaixo</div>

    <!-- paddings: p-1 até p-5 -->
     <div class="p-4">Padding tamanho 4</div>
     <div class="pt-4">Padding só em cima</div>

    <p class="text-primary">Azul</p>
    <p class="text-success">Verde</p>
    <p class="text-danger">Vermelho</p>
    <p class="text-warning">Amarelo</p>
    <p class="text-info">Azul Claro</p>
</body>
</html>
